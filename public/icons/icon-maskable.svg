<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full bleed background (no rounded corners — Android clips the shape) -->
  <rect width="512" height="512" fill="#1a1d27"/>
  <!-- Grid is scaled down to ~60% so nothing gets clipped by circle/squircle masks -->
  <!-- Outer border — centred, 200×200, offset 156,156 -->
  <rect x="130" y="130" width="252" height="252" rx="6" fill="none" stroke="#6c8aff" stroke-width="10"/>
  <!-- thick box dividers (3×3 boxes) -->
  <line x1="214" y1="130" x2="214" y2="382" stroke="#6c8aff" stroke-width="7"/>
  <line x1="298" y1="130" x2="298" y2="382" stroke="#6c8aff" stroke-width="7"/>
  <line x1="130" y1="214" x2="382" y2="214" stroke="#6c8aff" stroke-width="7"/>
  <line x1="130" y1="298" x2="382" y2="298" stroke="#6c8aff" stroke-width="7"/>
  <!-- thin cell dividers -->
  <line x1="158" y1="130" x2="158" y2="382" stroke="#4a5080" stroke-width="2.5"/>
  <line x1="186" y1="130" x2="186" y2="382" stroke="#4a5080" stroke-width="2.5"/>
  <line x1="242" y1="130" x2="242" y2="382" stroke="#4a5080" stroke-width="2.5"/>
  <line x1="270" y1="130" x2="270" y2="382" stroke="#4a5080" stroke-width="2.5"/>
  <line x1="326" y1="130" x2="326" y2="382" stroke="#4a5080" stroke-width="2.5"/>
  <line x1="354" y1="130" x2="354" y2="382" stroke="#4a5080" stroke-width="2.5"/>
  <line x1="130" y1="158" x2="382" y2="158" stroke="#4a5080" stroke-width="2.5"/>
  <line x1="130" y1="186" x2="382" y2="186" stroke="#4a5080" stroke-width="2.5"/>
  <line x1="130" y1="242" x2="382" y2="242" stroke="#4a5080" stroke-width="2.5"/>
  <line x1="130" y1="270" x2="382" y2="270" stroke="#4a5080" stroke-width="2.5"/>
  <line x1="130" y1="326" x2="382" y2="326" stroke="#4a5080" stroke-width="2.5"/>
  <line x1="130" y1="354" x2="382" y2="354" stroke="#4a5080" stroke-width="2.5"/>
  <!-- Sample numbers inside safe zone -->
  <text x="172" y="203" font-family="Arial,sans-serif" font-size="44" font-weight="bold" fill="#a0aaff" text-anchor="middle">5</text>
  <text x="256" y="203" font-family="Arial,sans-serif" font-size="44" font-weight="bold" fill="#6c8aff" text-anchor="middle">3</text>
  <text x="340" y="287" font-family="Arial,sans-serif" font-size="44" font-weight="bold" fill="#a0aaff" text-anchor="middle">9</text>
  <text x="172" y="371" font-family="Arial,sans-serif" font-size="44" font-weight="bold" fill="#6c8aff" text-anchor="middle">7</text>
  <text x="340" y="371" font-family="Arial,sans-serif" font-size="44" font-weight="bold" fill="#a0aaff" text-anchor="middle">2</text>
</svg>
